name: Continuous Integration

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  verify:
    name: Code Quality & Setup Verification
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip' # cache pip dependencies automatically

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgdal-dev libproj-dev g++

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff # Install linter

      - name: Run Linter (Ruff)
        run: |
          ruff check .

      - name: Run Syntax Verification
        run: |
          python verify_syntax.py

      - name: Run Setup and Load Verification
        run: |
          python test_setup.py
