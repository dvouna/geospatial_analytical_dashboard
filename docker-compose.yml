version: '3.8'

services:
  dashboard:
    image: ${DOCKER_REGISTRY:-ghcr.io/dvouna}/${DOCKER_IMAGE_NAME:-geospatial_analytical_dashboard}:latest
    container_name: geospatial_dashboard
    restart: unless-stopped
    ports:
      - "127.0.0.1:8501:8501"  # Bind to localhost to protect from direct external access
    env_file:
      - .env
